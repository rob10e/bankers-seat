<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banker's Seat - Admin Diagnostics Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-healthy {
            background: #10b981;
        }

        .status-degraded {
            background: #f59e0b;
        }

        .status-critical {
            background: #ef4444;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            color: #333;
            font-weight: 600;
        }

        .error-list {
            background: #fee;
            border-left: 4px solid #ef4444;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
        }

        .error-item {
            color: #b91c1c;
            margin: 4px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .disabled-section {
            opacity: 0.6;
            pointer-events: none;
        }

        .section-title {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Banker's Seat Admin Diagnostics</h1>
            <p>System health and operational diagnostics for self-hosted deployment</p>
            <div class="controls">
                <button onclick="fetchDiagnostics()" id="refreshBtn">Refresh</button>
                <button onclick="toggleAutoRefresh()" id="autoRefreshBtn">Enable Auto-Refresh (30s)</button>
            </div>
        </header>

        <div id="errorContainer"></div>

        <div id="content" class="loading">
            Loading diagnostics...
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function fetchDiagnostics() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Loading...';

            try {
                const response = await fetch('/api/v1/admin/diagnostics', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                renderDiagnostics(data);
                clearError();
            } catch (error) {
                showError(`Failed to fetch diagnostics: ${error.message}`);
                console.error(error);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh';
            }
        }

        function renderDiagnostics(data) {
            const statusBadge = (status) => {
                const statusClass = `status-${status}`;
                return `<span class="status-badge ${statusClass}"></span>`;
            };

            const timeAgo = (isoString) => {
                const date = new Date(isoString);
                const now = new Date();
                const seconds = Math.floor((now - date) / 1000);
                
                if (seconds < 60) return 'just now';
                if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
                if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
                return `${Math.floor(seconds / 86400)}d ago`;
            };

            const formatBytes = (bytes) => {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            };

            const databaseCard = `
                <div class="card">
                    <h2>
                        ${statusBadge(data.database.status)}
                        Database Health
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">${data.database.isAccessible ? '✓ Accessible' : '✗ Unavailable'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Size</span>
                        <span class="stat-value">${formatBytes(data.database.databaseSizeBytes)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Tables</span>
                        <span class="stat-value">${data.database.tableCount}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Last Backup</span>
                        <span class="stat-value">${data.database.lastBackupMessage}</span>
                    </div>
                </div>
            `;

            const sessionsCard = `
                <div class="card">
                    <h2>
                        ${statusBadge('healthy')}
                        Session Statistics
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Total Sessions</span>
                        <span class="stat-value">${data.sessions.totalSessions}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Active</span>
                        <span class="stat-value">${data.sessions.activeSessions}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Lobby</span>
                        <span class="stat-value">${data.sessions.lobbyCount}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Paused</span>
                        <span class="stat-value">${data.sessions.pausedCount}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value">${data.sessions.completedCount}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Active Participants</span>
                        <span class="stat-value">${data.sessions.activeParticipants} / ${data.sessions.totalParticipants}</span>
                    </div>
                </div>
            `;

            const ledgerCard = `
                <div class="card">
                    <h2>
                        ${statusBadge(data.ledger.status)}
                        Ledger Consistency
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">${data.ledger.isConsistent ? '✓ Consistent' : '✗ Issues Detected'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total Transactions</span>
                        <span class="stat-value">${data.ledger.totalTransactions}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Last Hour</span>
                        <span class="stat-value">${data.ledger.transactionsLastHour}</span>
                    </div>
                    ${data.ledger.inconsistencyDetails ? `
                        <div class="error-list">
                            <div class="error-item">${data.ledger.inconsistencyDetails}</div>
                        </div>
                    ` : ''}
                </div>
            `;

            const templatesCard = `
                <div class="card">
                    <h2>
                        ${statusBadge(data.templates.status)}
                        Template Validation
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Valid Templates</span>
                        <span class="stat-value">${data.templates.validTemplates}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Invalid Templates</span>
                        <span class="stat-value">${data.templates.invalidTemplates}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Cached</span>
                        <span class="stat-value">${data.templates.cachedTemplates}</span>
                    </div>
                    ${data.templates.invalidTemplateIds.length > 0 ? `
                        <div class="error-list">
                            ${data.templates.invalidTemplateIds.slice(0, 3).map(id => `
                                <div class="error-item">• ${id}</div>
                            `).join('')}
                            ${data.templates.invalidTemplateIds.length > 3 ? `
                                <div class="error-item">... and ${data.templates.invalidTemplateIds.length - 3} more</div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;

            const errorsCard = `
                <div class="card">
                    <h2>
                        ${statusBadge(data.recentErrors.status)}
                        Recent Errors
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Last Hour</span>
                        <span class="stat-value">${data.recentErrors.errorCountLastHour}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Last 24 Hours</span>
                        <span class="stat-value">${data.recentErrors.errorCountLastDay}</span>
                    </div>
                </div>
            `;

            const content = `
                <div class="status-grid">
                    ${databaseCard}
                    ${sessionsCard}
                    ${ledgerCard}
                    ${templatesCard}
                    ${errorsCard}
                </div>
                <div class="timestamp">
                    Last checked: ${timeAgo(data.checkedAtUtc)} (${new Date(data.checkedAtUtc).toLocaleTimeString()})
                </div>
            `;

            document.getElementById('content').innerHTML = content;
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('autoRefreshBtn');
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                btn.textContent = 'Enable Auto-Refresh (30s)';
            } else {
                autoRefreshInterval = setInterval(fetchDiagnostics, 30000);
                btn.textContent = 'Disable Auto-Refresh';
            }
        }

        // Initial load
        fetchDiagnostics();
    </script>
</body>
</html>
