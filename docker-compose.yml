services:
  bankers-seat:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BankersSeat: Data Source=/data/bankers-seat.db
      Templates__Root: /templates
    volumes:
      - bankers-seat-data:/data
      - ./templates:/templates:ro

volumes:
  bankers-seat-data:
